<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Prático - UC10 Senac</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        /* Requisito: Layout organizado, centralizado e responsivo */
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: radial-gradient(circle, rgb(255, 255, 255), rgb(0, 51, 102)); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .contato-container { 
            background: white; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 400px; 
        }
        h2 { color: #004a8d; text-align: center; margin-bottom: 20px; }
        
        /* Estilização dos Campos e Alinhamento */
        .campo-grupo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select, textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            box-sizing: border-box; 
            font-size: 14px;
        }
        textarea { height: 100px; resize: none; }
        
        /* Botão Estilizado */
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #004a8d; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            transition: 0.3s;
        }
        button:hover { background-color: #003366; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }

        /* Mensagens de Feedback via DOM */
        #feedback { 
            margin-top: 20px; 
            padding: 10px; 
            border-radius: 5px; 
            text-align: center; 
            display: none; 
            font-weight: bold;
        }
        .msg-sucesso { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .msg-erro { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<!-- Container principal -->
<div class="contato-container">
    <h2>Fale Conosco</h2> <!-- Título do formulário -->
    
    <!-- Formulário -->
    <form id="form-contato">

        <!-- Campo Nome -->
        <div class="campo-grupo">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
        </div>

        <!-- Campo Email -->
        <div class="campo-grupo">
            <label for="email">E-mail:</label>
            <input type="text" id="email" name="email" placeholder="seu@email.com">
        </div>

        <!-- Campo Tema -->
        <div class="campo-grupo">
            <label for="tema">Tema:</label>
            <select id="tema" name="tema">
                <option value="">Selecione um tema...</option>
                <option value="Sugestão">Sugestão</option>
                <option value="Reclamação">Reclamação</option>
                <option value="Dúvida">Dúvida</option>
                <option value="Elogio">Elogio</option>
                <option value="Outros">Outros</option>
            </select>
        </div>

        <!-- Campo Mensagem -->
        <div class="campo-grupo">
            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" placeholder="Sua mensagem aqui..."></textarea>
        </div>

        <!-- Botão de envio -->
        <button type="submit" id="btn-enviar">Enviar Mensagem</button>
    </form>
    
    <!-- Área de feedback -->
    <div id="feedback"></div>
</div>

<script>
    // Inicializa o EmailJS com sua chave pública
    emailjs.init("8vS1lEBUXnr-5VUWY");

    // Captura os elementos do DOM
    const form = document.getElementById('form-contato'); // Formulário
    const feedbackMsg = document.getElementById('feedback'); // Caixa de feedback
    const btnSubmit = document.getElementById('btn-enviar'); // Botão

    // Adiciona evento de envio ao formulário
    form.addEventListener('submit', function(event) {
        
        event.preventDefault(); // Impede o envio padrão da página (recarregar)

        // Captura os valores digitados
        const nome = document.getElementById('nome').value.trim();
        const email = document.getElementById('email').value.trim();
        const tema = document.getElementById('tema').value;
        const mensagem = document.getElementById('mensagem').value.trim();

        // Validação: verifica se algum campo está vazio
        if (nome === "" || email === "" || tema === "" || mensagem === "") {
            exibirResposta("Erro: Todos os campos são obrigatórios!", "msg-erro");
            return; // Para a execução
        }

        // Validação simples de e-mail
        if (!email.includes("@") || !email.includes(".")) {
            exibirResposta("Erro: Digite um e-mail válido!", "msg-erro");
            return;
        }

        // Estado de carregamento
        btnSubmit.innerText = "Enviando..."; // Altera texto do botão
        btnSubmit.disabled = true; // Desativa botão
        feedbackMsg.style.display = "none"; // Esconde feedback

        // IDs do EmailJS
        const serviceID = 'service_7z31mt9';
        const templateID = 'template_xdzh10w';

        // Envia o formulário usando EmailJS
        emailjs.sendForm(serviceID, templateID, this)
            .then(() => {
                // Se deu certo
                exibirResposta("✅ Sucesso! Mensagem enviada para o Outlook.", "msg-sucesso");
                form.reset(); // Limpa o formulário
            }, (error) => {
                // Se deu erro
                exibirResposta("❌ Erro ao enviar. Tente novamente.", "msg-erro");
                console.log("Falha:", error); // Mostra erro no console
            })
            .finally(() => {
                // Sempre executa (sucesso ou erro)
                btnSubmit.innerText = "Enviar Mensagem";
                btnSubmit.disabled = false;
            });
    });

    // Função que mostra mensagem na tela
    function exibirResposta(texto, classe) {
        feedbackMsg.innerText = texto; // Define o texto
        feedbackMsg.className = classe; // Define a classe (cor)
        feedbackMsg.style.display = "block"; // Mostra na tela
    }
</script>

</body>
</html>
