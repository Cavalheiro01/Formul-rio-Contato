<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios de Prática JS</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            line-height: 1.6;
            transition: background 0.3s;
        }

        section {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            background: #f9f9f9;
        }

        h2 {
            margin-top: 0;
        }

        .contador-valor {
            font-size: 24px;
            font-weight: bold;
        }

        li {
            cursor: pointer;
            padding: 5px;
        }

        li:hover {
            text-decoration: line-through;
            color: red;
        }
    </style>
</head>

<body>
    <section>
        <h2>1. Boa Vindas</h2>
        <input type="text" id="nomeInput" placeholder="Digite seu nome">
        <button onclick="boasVindas()">Saudar</button>
        <h2 id="mensagem"></h2>
    </section>

    <section>
        <h2>2. Contador</h2>
        <div class="contador-valor" id="contadorValor">0</div>
        <button onclick="alterarContador(-1)">>- Diminuir</button>
        <button onclick="alterarContador(1)">+> Aumentar</button>
    </section>

    <section>
        <h2>3. Lista de Tarefas</h2>
        <small>Clique em um item para marcar como concluído</small><br>
        <input type="text" id="tarefaInput" placeholder="Nova tarefa">
        <button onclick="adicionarTarefa()">Adicionar Tarefa</button>
        <ul id="listaTarefas"></ul>
    </section>

    <section>
        <h2>4. Galeria Simples</h2>
        <button onclick="mudarFundo('white')">Reset (Branco)</button>
        <button onclick="mudarFundo('#ffcccc')">Rosa</button>
        <button onclick="mudarFundo('#ccffcc')">Verde</button>
        <button onclick="mudarFundo('#ccccff')">Azul</button>
    </section>

    <script>
        function boasVindas() {
            const nome = document.getElementById('nomeInput').value;
            const display = document.getElementById('mensagem');
            display.innerText = nome ? `Olá, ${nome}!` : "";
        }

        let count = 0;
        function alterarContador(num) {
            count += num;
            const el = document.getElementById('contadorValor');
            el.innerText = count;

            if (count > 0) el.style.color = "blue";
            else if (count < 0) el.style.color = "red";
            else el.style.color = "black";
        }

        function adicionarTarefa() {
            const input = document.getElementById('tarefaInput');
            const ul = document.getElementById('listaTarefas');
            if (input.value.trim() !== "") {
                const li = document.createElement('li');
                li.innerText = input.value;
                li.onclick = function() {this.remove();}
                ul.appendChild(li);
                input.value = "";
            }
        }

        function mudarFundo(cor) {
            document.body.style.backgroundColor = cor;
        }
    </script>
</body>

</html>
